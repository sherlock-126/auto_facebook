# nginx vhost for nextclaw.vn on `second` → the cloud-only app container (127.0.0.1:4210).
# One-time setup on second:
#   1) cp deploy/nginx/nextclaw.vn.conf /etc/nginx/sites-available/nextclaw.vn
#   2) ln -s /etc/nginx/sites-available/nextclaw.vn /etc/nginx/sites-enabled/
#   3) nginx -t && systemctl reload nginx
#   4) certbot --nginx -d nextclaw.vn -d www.nextclaw.vn   (adds the :443 block + HTTP→HTTPS redirect)
# Confirm the upstream port matches NEXTCLAW_PORT in the prod .env (default 4210).

server {
    listen 80;
    listen [::]:80;
    server_name nextclaw.vn www.nextclaw.vn;

    # Let's Encrypt http-01 challenge (certbot writes here before issuing).
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        proxy_pass http://127.0.0.1:4210;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
