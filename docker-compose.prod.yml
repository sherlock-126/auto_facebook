# nextclaw production (cloud-only) — deployed on `second`, fronted by nginx → nextclaw.vn.
# Scraping is NOT done here; customers run the agent on their own VPS and upload via /api/agent/upload.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    volumes:
      - nextclaw_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      APP_HOST: 0.0.0.0
      APP_PORT: "4200"
      CLOUD_ONLY: "1"
    depends_on:
      postgres:
        condition: service_healthy
    # Bind to loopback only — nginx on the host terminates TLS and proxies in.
    ports:
      - "127.0.0.1:${NEXTCLAW_PORT:-4210}:4200"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4200/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      CLOUD_ONLY: "1"
      APP_HOST_INTERNAL: app
      APP_PORT: "4200"
    depends_on:
      app:
        condition: service_started
    command: ["npx", "tsx", "src/scheduler.ts"]

volumes:
  nextclaw_pg:
